[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Clean URLs for server-side functions
[[redirects]]
  from = "/api/demo"
  to = "/.netlify/functions/demo"
  status = 200
  force = true

[[redirects]]
  from = "/api/track"
  to = "/.netlify/functions/track"
  status = 200
  force = true

[[redirects]]
  from = "/api/analytics-summary"
  to = "/.netlify/functions/analytics-summary"
  status = 200
  force = true

[[redirects]]
  from = "/api/monday-recent"
  to = "/.netlify/functions/monday-recent"
  status = 200
  force = true
